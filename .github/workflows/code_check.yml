name: <MASTER> Code Check

on:
  push:
    branches:
      - master
      - dev
      - gui
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  code_check:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code checks (pytest + compileall)
        shell: pwsh
        run: |
          pytest -q tests
          python -m compileall .