# Highway Detection - CI/CD Pipeline
# Runs tests on every push/PR and builds release on tags

name: CI/CD Pipeline

on:
  push:
    branches: [master, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [master, dev]

env:
  PYTHON_VERSION: '3.10'
  APP_NAME: 'HighwayDetection'

jobs:
  # ====================
  # Job 1: Code Quality
  # ====================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check formatting with black
        run: black --check --diff .
        continue-on-error: true

      - name: Check imports with isort
        run: isort --check-only --diff .
        continue-on-error: true

  # ====================
  # Job 2: Unit Tests
  # ====================
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-qt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
        continue-on-error: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ====================
  # Job 3: Build Windows App
  # ====================
  build-windows:
    name: Build Windows Application
    runs-on: windows-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: |
          pyinstaller highway_detection.spec --clean

      - name: Create release package
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $releaseDir = "release/${{ env.APP_NAME }}-$version"
          
          New-Item -ItemType Directory -Path $releaseDir -Force
          Copy-Item -Path "dist/${{ env.APP_NAME }}/*" -Destination $releaseDir -Recurse
          
          if (Test-Path "README.md") { Copy-Item "README.md" $releaseDir }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" $releaseDir }
          
          "${{ env.APP_NAME }} v$version`nBuild: ${{ github.run_number }}`nCommit: ${{ github.sha }}" | Out-File "$releaseDir/VERSION.txt"
          
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "release/${{ env.APP_NAME }}-$version-win64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-${{ steps.get_version.outputs.VERSION }}
          path: release/*.zip
          retention-days: 30

  # ====================
  # Job 4: Create Release
  # ====================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD >> CHANGELOG.md
          else
            git log --pretty=format:"- %s (%h)" -20 >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...v${{ steps.get_version.outputs.VERSION }}" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Highway Detection v${{ steps.get_version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: artifacts/**/*.zip
          generate_release_notes: true

  # ====================
  # Job 5: Notify
  # ====================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Send success notification
        if: needs.release.result == 'success'
        run: |
          echo "✅ Release v${{ github.ref_name }} created successfully!"
          # Add Slack/Discord/Email notification here if needed

      - name: Send failure notification
        if: needs.release.result == 'failure'
        run: |
          echo "❌ Release v${{ github.ref_name }} failed!"
          # Add Slack/Discord/Email notification here if needed
