name: <MASTER> Build Executable

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  RETENTION_DAYS: 7

jobs:
  build_exe:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PyInstaller app
        shell: pwsh
        run: |
          python scripts/build.py --clean

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/vision_app")) {
            throw "dist/vision_app not found after build"
          }

      - name: Create zipped artifact
        shell: pwsh
        run: |
          if (Test-Path "dist/vision_app.zip") {
            Remove-Item "dist/vision_app.zip" -Force
          }
          Compress-Archive -Path "dist/vision_app/*" -DestinationPath "dist/vision_app.zip" -Force

      - name: Upload artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: vision_app_${{ github.sha }}
          path: dist/vision_app.zip
          retention-days: ${{ env.RETENTION_DAYS }}
